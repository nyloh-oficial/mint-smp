# =====================================================
#  MINT SMP - crates.yml
#  5 crates at /warp crates.
#  *** NO RNG *** You are shown 7 rewards and PICK 1.
#  (Gambling/random rolls were removed after a dupe incident.)
#  Hourly keyall gives every online player one free key.
# =====================================================

crates:
  location-warp: "crates"
  pick-count: 7          # rewards presented; player picks exactly 1
  keyall:
    enabled: true
    interval-minutes: 60
    # which crate the hourly free key is for:
    crate: COMMON

  # Per crate: where keys come from + the 7-reward pool shown.
  # Loot is cosmetic / convenience / gear only (fairness invariant).
  list:

    COMMON:
      display: "<green>Common Crate"
      key-sources: ["keyall", "200 shards", "store"]
      rewards:   # 7 presented; pick 1. Enchanted diamond gear theme.
        - { type: item, material: DIAMOND_SWORD,      enchants: "SHARPNESS:3,UNBREAKING:3" }
        - { type: item, material: DIAMOND_PICKAXE,    enchants: "EFFICIENCY:4,UNBREAKING:3" }
        - { type: item, material: DIAMOND_CHESTPLATE, enchants: "PROTECTION:3,UNBREAKING:3" }
        - { type: item, material: DIAMOND_HELMET,     enchants: "PROTECTION:3" }
        - { type: item, material: DIAMOND_LEGGINGS,   enchants: "PROTECTION:3" }
        - { type: item, material: DIAMOND_BOOTS,      enchants: "PROTECTION:3,FEATHER_FALLING:3" }
        - { type: item, material: DIAMOND_AXE,        enchants: "SHARPNESS:3" }

    PRIME:
      display: "<green>Prime Crate"
      key-sources: ["keyall (low)", "1500 shards", "store"]
      rewards:   # Enchanted Netherite (+ chance at Mace)
        - { type: item, material: MACE,                  enchants: "DENSITY:3,UNBREAKING:3" }
        - { type: item, material: NETHERITE_SWORD,       enchants: "SHARPNESS:4,UNBREAKING:3" }
        - { type: item, material: NETHERITE_CHESTPLATE,  enchants: "PROTECTION:4,UNBREAKING:3" }
        - { type: item, material: NETHERITE_HELMET,      enchants: "PROTECTION:4" }
        - { type: item, material: NETHERITE_LEGGINGS,    enchants: "PROTECTION:4" }
        - { type: item, material: NETHERITE_BOOTS,       enchants: "PROTECTION:4,FEATHER_FALLING:4" }
        - { type: item, material: NETHERITE_PICKAXE,     enchants: "EFFICIENCY:5,UNBREAKING:3" }

    CRIMSON:
      display: "<green>Crimson Crate"
      key-sources: ["1500 shards", "store"]
      rewards:   # Enchanted Netherite
        - { type: item, material: NETHERITE_SWORD,       enchants: "SHARPNESS:5,UNBREAKING:3,MENDING:1" }
        - { type: item, material: NETHERITE_AXE,         enchants: "SHARPNESS:5,UNBREAKING:3" }
        - { type: item, material: NETHERITE_CHESTPLATE,  enchants: "PROTECTION:4,UNBREAKING:3,MENDING:1" }
        - { type: item, material: NETHERITE_HELMET,      enchants: "PROTECTION:4,MENDING:1" }
        - { type: item, material: NETHERITE_LEGGINGS,    enchants: "PROTECTION:4,MENDING:1" }
        - { type: item, material: NETHERITE_BOOTS,       enchants: "PROTECTION:4,DEPTH_STRIDER:3,MENDING:1" }
        - { type: item, material: NETHERITE_PICKAXE,     enchants: "EFFICIENCY:5,FORTUNE:3,MENDING:1" }

    GOLD:
      display: "<green>Gold Crate"
      key-sources: ["store"]
      rewards:   # Spawner of choice (the 8 custom spawner types)
        - { type: spawner, spawner: IRON_GOLEM }
        - { type: spawner, spawner: BLAZE }
        - { type: spawner, spawner: ENDERMAN }
        - { type: spawner, spawner: CREEPER }
        - { type: spawner, spawner: SKELETON }
        - { type: spawner, spawner: ZOMBIE }
        - { type: spawner, spawner: SPIDER }

    AMETHYST:
      display: "<green>Amethyst Crate"
      key-sources: ["store"]
      rewards:   # Amethyst Items (3-day self-destruct timer applies)
        - { type: amethyst, amethyst: PICKAXE }
        - { type: amethyst, amethyst: AXE }
        - { type: amethyst, amethyst: SHOVEL }
        - { type: amethyst, amethyst: BUCKET }
        - { type: amethyst, amethyst: SHARD_BOOSTER }
        - { type: amethyst, amethyst: PICKAXE }
        - { type: amethyst, amethyst: SHARD_BOOSTER }
