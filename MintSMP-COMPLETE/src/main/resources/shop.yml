# =====================================================
#  MINT SMP - shop.yml  (the /shop GUI)
#  NOTE: per SPEC.md §1, /shop is the SHARD SHOP. The buy
#  values below are the original money figures; Milestone 5
#  decides currency per item (default: shards). Money buying
#  also stays available via /store and /orders.
#  Buy prices are ABOVE sell prices to stop resale loops.
# =====================================================
shop:
  title: "<gradient:#3DDC84:#1B5E20><bold>Mint Shop</bold></gradient>"
  rows: 6

  categories:

    end:
      display: "<green>End Shop"
      icon: ENDER_PEARL
      items:
        ENDER_PEARL:      { buy: 40 }
        ENDER_CHEST:      { buy: 2500 }
        SHULKER_SHELL:    { buy: 400 }
        CHORUS_FRUIT:     { buy: 10 }
        END_STONE:        { buy: 4 }

    nether:
      display: "<green>Nether Shop"
      icon: BLAZE_ROD
      items:
        BLAZE_ROD:        { buy: 150 }
        MAGMA_CREAM:      { buy: 120 }
        QUARTZ:           { buy: 10 }

    gear:
      display: "<green>Gear Shop"
      icon: DIAMOND_SWORD
      items:
        TOTEM_OF_UNDYING: { buy: 2500 }
        GOLDEN_APPLE:     { buy: 200 }
        POTION_FIRE_RESISTANCE: { buy: 150 }   # give as Fire Resistance potion
        POTION_SPEED:     { buy: 120 }          # Swiftness potion
        POTION_STRENGTH:  { buy: 200 }
        DIAMOND_SWORD:    { buy: 5000 }
        TRIAL_KEY:        { buy: 500 }
        EXPERIENCE_BOTTLE:{ buy: 30 }
        BREEZE_ROD:       { buy: 800 }

    food:
      display: "<green>Food Shop"
      icon: GOLDEN_CARROT
      items:
        GOLDEN_CARROT:    { buy: 25 }
        COOKED_BEEF:      { buy: 10 }   # Steak
        COOKED_CHICKEN:   { buy: 8 }
        APPLE:            { buy: 5 }
        COOKIE:           { buy: 2 }

    economic:
      display: "<green>Economic Shop"
      icon: DIAMOND_PICKAXE
      items:
        DIAMOND_PICKAXE:  { buy: 400 }
        DIAMOND_HOE:      { buy: 150 }
        FISHING_ROD:      { buy: 500, enchant: "LUCK_OF_THE_SEA:2" }  # Luck of the Sea II
        WHEAT_SEEDS:      { buy: 2 }
        TORCH:            { buy: 2 }
