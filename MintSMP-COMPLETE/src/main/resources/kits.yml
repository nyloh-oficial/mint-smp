# =====================================================
#  MINT SMP - kits.yml
#  Kits are EQUAL for everyone (no "permission" = open to all).
#  This preserves the fairness invariant: no gear/economic edge
#  is sold. Add a "permission" key only for cosmetic/QoL kits.
# =====================================================

kits:
  default-cooldown-seconds: 86400   # 24h

  list:
    starter:
      display: "<green>Starter Kit"
      cooldown-seconds: 3600        # 1h
      one-time: false
      items:
        - { material: STONE_SWORD, amount: 1 }
        - { material: STONE_PICKAXE, amount: 1 }
        - { material: STONE_AXE, amount: 1 }
        - { material: BREAD, amount: 16 }
        - { material: OAK_LOG, amount: 32 }
        - { material: TORCH, amount: 16 }

    food:
      display: "<gold>Food Kit"
      cooldown-seconds: 7200        # 2h
      items:
        - { material: COOKED_BEEF, amount: 32 }
        - { material: GOLDEN_CARROT, amount: 16 }

    tools:
      display: "<aqua>Tools Kit"
      cooldown-seconds: 43200       # 12h
      items:
        - { material: IRON_PICKAXE, amount: 1, enchants: "efficiency:2,unbreaking:1" }
        - { material: IRON_AXE, amount: 1, enchants: "unbreaking:1" }
        - { material: IRON_SHOVEL, amount: 1 }

    daily:
      display: "<light_purple>Daily Kit"
      cooldown-seconds: 86400       # 24h
      items:
        - { material: EXPERIENCE_BOTTLE, amount: 16 }
        - { material: ENDER_PEARL, amount: 4 }
        - { material: GOLDEN_APPLE, amount: 2 }
