name: Build MintSMP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Jar
      defaults:
        run:
          working-directory: "Mint Plugin"
      run: |
        if [ -f "pom.xml" ]; then
          mvn -B package
        elif [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew build
        elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
          gradle build
        else
          echo "Error: No build file found inside Mint Plugin directory!"
          ls -la
          exit 1
        fi

    - name: Upload compiled .jar artifact
      uses: actions/upload-artifact@v4
      with:
        name: MintSMP-Plugin
        path: |
          Mint Plugin/target/*.jar
          Mint Plugin/build/libs/*.jar
