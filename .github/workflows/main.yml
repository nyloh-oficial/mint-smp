name: Build MintSMP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Auto-Detect and Build Plugin
      run: |
        POM_PATH=$(find . -name "pom.xml" -print -quit)
        GRADLE_PATH=$(find . -name "build.gradle" -print -quit)
        GRADLE_KTS_PATH=$(find . -name "build.gradle.kts" -print -quit)
        
        if [ ! -z "$POM_PATH" ]; then
          echo "Found Maven project at: $POM_PATH"
          mvn -B package --file "$POM_PATH"
          DIR=$(dirname "$POM_PATH")
          echo "ARTIFACT_PATH=$DIR/target/*.jar" >> $GITHUB_ENV
          
        elif [ ! -z "$GRADLE_PATH" ] || [ ! -z "$GRADLE_KTS_PATH" ]; then
          TARGET_FILE="${GRADLE_PATH:-$GRADLE_KTS_PATH}"
          echo "Found Gradle project at: $TARGET_FILE"
          DIR=$(dirname "$TARGET_FILE")
          cd "$DIR"
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew build
          else
            gradle build
          fi
          cd -
          echo "ARTIFACT_PATH=$DIR/build/libs/*.jar" >> $GITHUB_ENV
          
        else
          echo "ERROR: Could not find any pom.xml or build.gradle files in this repo."
          exit 1
        fi

    - name: Upload compiled .jar artifact
      uses: actions/upload-artifact@v4
      with:
        name: MintSMP-Plugin
        path: ${{ env.ARTIFACT_PATH }}
