name: Build MintSMP

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Find pom.xml and build
        run: |
          POM="$(find . -name pom.xml -not -path '*/target/*' | head -n1)"
          if [ -z "$POM" ]; then
            echo "::error::No pom.xml found anywhere in the repo."
            exit 1
          fi
          POM_DIR="$(dirname "$POM")"
          echo "Found pom.xml in: $POM_DIR"
          cd "$POM_DIR"
          mvn -B clean package
          echo "JAR_DIR=$POM_DIR/target" >> "$GITHUB_ENV"

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: MintSMP-jar
          path: ${{ env.JAR_DIR }}/MintSMP-*.jar
          if-no-files-found: error
