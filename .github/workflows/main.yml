name: Build MintSMP

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        cd "Mint Plugin"
        if [ -f "gradlew" ]; then
          chmod +x gradlew
          ./gradlew build
        else
          gradle build
        fi

    - name: Upload compiled .jar artifact
      uses: actions/upload-artifact@v4
      with:
        name: MintSMP-Plugin
        path: "Mint Plugin/build/libs/*.jar"
