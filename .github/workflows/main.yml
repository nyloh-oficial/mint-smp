name: Build MintSMP

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Locate the REAL project and build
        run: |
          echo "All pom.xml files in the repo:"
          find . -name pom.xml -not -path '*/target/*' -print

          # Pick the pom whose sibling tree actually contains Settings.java
          # (that's the complete, correct copy — ignores stale/partial ones).
          POM=""
          while IFS= read -r candidate; do
            dir="$(dirname "$candidate")"
            if [ -f "$dir/src/main/java/net/mintsmp/feature/Settings.java" ]; then
              POM="$candidate"
              break
            fi
          done < <(find . -name pom.xml -not -path '*/target/*')

          if [ -z "$POM" ]; then
            echo "::error::No complete project found (no pom.xml has feature/Settings.java next to it)."
            echo "This means the new files (Settings, Minerals, AntiSpam, SpawnerStack, Ranks) are not uploaded."
            exit 1
          fi

          POM_DIR="$(dirname "$POM")"
          echo "================================================"
          echo "Building the COMPLETE project at: $POM_DIR"
          echo "feature/ contents:"
          ls "$POM_DIR/src/main/java/net/mintsmp/feature/"
          echo "================================================"
          cd "$POM_DIR"
          mvn -B clean package
          echo "JAR_DIR=$POM_DIR/target" >> "$GITHUB_ENV"

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: MintSMP-jar
          path: ${{ env.JAR_DIR }}/MintSMP-*.jar
          if-no-files-found: error
