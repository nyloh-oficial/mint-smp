name: MintSMP
version: 1.0.0
main: net.mintsmp.MintSMP
api-version: '1.21'
author: nyloh-oficial
description: Economy + PvP grind server (Donut-style) — single bundled plugin.
folia-supported: false
softdepend: [PlaceholderAPI]

permissions:
  mint.admin:
    description: Admin commands (eco, key, keyall, spawner, amethyst, reload, setwarp, setspawn)
    default: op
  mint.use:
    description: Base player commands
    default: true
  mint.nick:
    description: Use /nick
    default: op

commands:
  mintsmp:
    description: Plugin info / reload
    aliases: [mint]
  balance:
    description: Show balance
    aliases: [bal, money, eco-bal]
  pay:
    description: Pay a player money
  baltop:
    description: Top balances
  shards:
    description: Show shard balance
  eco:
    description: Admin economy management
  sell:
    description: Sell items (hand/all/<material>)
  worth:
    description: Show an item's sell value
  sellmulti:
    description: Show your per-item sell multipliers
  sellboost:
    description: Admin global sell booster
  shop:
    description: Open the Shard Shop
  ah:
    description: Auction House (sell/search/collect)
    aliases: [auction, auctionhouse]
  crates:
    description: Open crates
    aliases: [crate]
  key:
    description: Admin give crate keys
  keyall:
    description: Admin give a key to everyone
  spawner:
    description: Admin give custom spawners
  amethyst:
    description: Admin give amethyst items
  sethome:
    description: Set a home
  home:
    description: Teleport to a home
  delhome:
    description: Delete a home
  homes:
    description: List your homes
  tpa:
    description: Request to teleport to a player
  tpahere:
    description: Request a player to teleport to you
  tpaccept:
    description: Accept a teleport request
    aliases: [tpyes]
  tpdeny:
    description: Deny a teleport request
    aliases: [tpno]
  rtp:
    description: Random teleport (overworld/nether/end)
    aliases: [wild, randomtp]
  spawn:
    description: Teleport to spawn
  setspawn:
    description: Admin set spawn
  warp:
    description: Warp to a named warp
  setwarp:
    description: Admin set a warp
  delwarp:
    description: Admin delete a warp
  bounty:
    description: Place a bounty on a player
  afk:
    description: Toggle AFK
  stats:
    description: Show player stats
  killtop:
    description: Top kills
  playtimetop:
    description: Top playtime
  blockstop:
    description: Top blocks mined
  shardstop:
    description: Top shards
  leaderboard:
    description: Leaderboards
    aliases: [lb]
  scoreboard:
    description: Toggle the sidebar
    aliases: [sb, togglesb]
  msg:
    description: Private message
    aliases: [whisper, w, pm, dm]
  tell:
    description: Private message
  r:
    description: Reply to last message
    aliases: [reply]
  ignore:
    description: Ignore a player
  unignore:
    description: Stop ignoring a player
  ignorelist:
    description: List ignored players
  msgtoggle:
    description: Toggle private messages
  near:
    description: List nearby players
  list:
    description: List online players
    aliases: [online, who]
  ping:
    description: Show ping
  seen:
    description: When a player was last online
  findplayer:
    description: Locate an online player
    aliases: [fp, locate]
  rules:
    description: Show server rules
  report:
    description: Report a player or issue
  discord:
    description: Discord link
  store:
    description: Store link
  website:
    description: Website link
  settings:
    description: Personal settings
  team:
    description: Teams / clans
    aliases: [clan, t]
  duel:
    description: Challenge a player to a 1v1
  orders:
    description: Buy orders (browse/create)
    aliases: [order, buyorders]
  kit:
    description: Claim a kit
  kits:
    description: List kits
  pwarp:
    description: Player warps (visit/set/delete)
    aliases: [pwarps, playerwarp]
  back:
    description: Return to your previous location
  daily:
    description: Claim your daily reward
  ec:
    description: Open your ender chest
    aliases: [enderchest]
  craft:
    description: Open a crafting table
    aliases: [workbench, wb]
  anvil:
    description: Open an anvil
  grindstone:
    description: Open a grindstone
  cartography:
    description: Open a cartography table
  loom:
    description: Open a loom
  smithing:
    description: Open a smithing table
  stonecutter:
    description: Open a stonecutter
  trash:
    description: Open a trash bin
    aliases: [disposal]
  hat:
    description: Wear the held item
  heal:
    description: Heal yourself (admin)
  feed:
    description: Feed yourself (admin)
  fly:
    description: Toggle flight (admin)
  repair:
    description: Repair held item (admin)
  god:
    description: Toggle god mode (admin)
  nick:
    description: Set a nickname
  quickbuy:
    description: Buy the cheapest Auction House listings
    aliases: [qb]
  trap:
    description: Staff honeypot trap (set/remove/info)
    aliases: [honeypot, stash]
  ban:
    description: Ban a player (admin)
    aliases: [mban]
  tempban:
    description: Temporarily ban a player (admin)
    aliases: [mtempban]
  unban:
    description: Unban a player (admin)
    aliases: [pardon, munban]
  kick:
    description: Kick a player (admin)
    aliases: [mkick]
  mute:
    description: Mute a player (admin)
    aliases: [mmute]
  unmute:
    description: Unmute a player (admin)
    aliases: [munmute]
