# =====================================================
#  MINT SMP - mythic.yml
#  Limited-edition OP gear. Each type has a LIFETIME mint cap
#  (default 5). Once 5 are minted, that item is sold out forever.
#  Bought with in-game money (not pay-to-win — everyone can grind to it).
#  Each comes stamped with a serial: #1/5 .. #5/5.
# =====================================================

mythic:
  soulbound: false        # true = kept on death; false = drops (high-stakes PvP)
  default-cap: 5

  items:
    EXCALIBUR:
      display: "<gradient:#ff5555:#ffaa00>Excalibur</gradient>"
      material: NETHERITE_SWORD
      price: 1000000000
      cap: 5
    WORLD_EATER:
      display: "<gradient:#55ffff:#5555ff>World Eater</gradient>"
      material: NETHERITE_PICKAXE
      price: 1000000000
      cap: 5
    AEGIS:
      display: "<gradient:#ffff55:#ffaa00>Aegis</gradient>"
      material: NETHERITE_CHESTPLATE   # icon only; minting gives the full 4-piece set
      price: 1000000000
      cap: 5
    STORMCALLER:
      display: "<gradient:#aaaaff:#ffffff>Stormcaller</gradient>"
      material: BOW
      price: 1000000000
      cap: 5
    PHOENIX:
      display: "<gradient:#ff5555:#ffff55>Phoenix Wings</gradient>"
      material: ELYTRA
      price: 1000000000
      cap: 5
    HEART_OF_VOID:
      display: "<gradient:#aa00aa:#5500ff>Heart of the Void</gradient>"
      material: NETHER_STAR
      price: 1000000000
      cap: 5
    EARTHSHAKER:
      display: "<gradient:#aa5500:#ffaa00>Earthshaker</gradient>"
      material: MACE
      price: 1000000000
      cap: 5
    CORNUCOPIA:
      display: "<gradient:#55ff55:#ffff55>Cornucopia</gradient>"
      material: TOTEM_OF_UNDYING
      price: 1000000000
      cap: 5

  # Tunables for the effects.
  effects:
    excalibur-lifesteal-hearts: 1.0
    excalibur-lightning-chance: 0.25
    world-eater-radius: 2          # 2 => 5x5x5 cube
    earthshaker-radius: 5.0
    earthshaker-damage: 8.0
    earthshaker-cooldown-seconds: 3
    cornucopia-cooldown-seconds: 300
    stormcaller-explosion-power: 2.0
